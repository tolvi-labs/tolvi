name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'

      - name: Validate sample vault against schemas
        run: npm run validate:schemas

      - name: Brand-isolation guard
        run: npm run validate:brand
        env:
          BRAND_BLOCKLIST: ${{ vars.BRAND_BLOCKLIST }}

      - name: Claude Code skill install smoke test
        run: bash .github/scripts/test-install-claude-code-skill.sh

      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # mailto: links are excluded by default in current lychee.
          # Skip vendored READMEs (node_modules) and engineering-process artifacts
          # (docs/superpowers/) — same allowlist logic as markdownlint and brand-isolation.
          # --max-retries 3 / --retry-wait-time 5: handle transient network blips
          # (Connection reset by peer, etc.) on otherwise-stable URLs.
          # --exclude 'claude\.ai': claude.ai returns 403 to lychee's User-Agent
          # despite being a valid URL for human visitors. Exclude rather than
          # adding 403 to --accept (too permissive).
          args: --no-progress --max-retries 3 --retry-wait-time 5 --exclude '^https://claude\.ai' --exclude-path node_modules --exclude-path docs/superpowers '**/*.md'
