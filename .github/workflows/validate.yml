name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'

      - name: Validate sample vault against schemas
        run: npm run validate:schemas

      - name: Brand-isolation guard
        run: npm run validate:brand

      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # mailto: links are excluded by default in current lychee.
          # node_modules contains vendored READMEs with stale third-party links — skip them.
          args: --no-progress --exclude-path node_modules '**/*.md'
