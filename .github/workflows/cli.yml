name: cli

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'spec/schemas/**'
      - '.github/workflows/cli.yml'
  pull_request:
    paths:
      - 'cli/**'
      - 'spec/schemas/**'
      - '.github/workflows/cli.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum
      - name: Verify embedded schemas match canonical sources
        run: |
          for f in vault-meta decision session pattern; do
            diff -u spec/schemas/$f.json cli/internal/format/schemas/$f.json \
              || { echo "schema drift: cli/internal/format/schemas/$f.json differs from spec/schemas/$f.json"; exit 1; }
          done
      - name: gofmt
        working-directory: cli
        run: |
          gofmt -l . | tee /tmp/gofmt-out
          test ! -s /tmp/gofmt-out || { echo "gofmt would reformat files (see above)"; exit 1; }
      - name: Vet
        working-directory: cli
        run: go vet ./...
      - name: Test
        working-directory: cli
        run: go test ./... -count=1 -race

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum
      - name: Build all release targets
        working-directory: cli
        run: |
          mkdir -p dist
          for target in \
            "darwin amd64" \
            "darwin arm64" \
            "linux amd64" \
            "linux arm64" \
            "windows amd64"; do
            read -r os arch <<< "$target"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -o "dist/tolvi-$os-$arch" ./cmd/tolvi
          done
          ls -la dist/
